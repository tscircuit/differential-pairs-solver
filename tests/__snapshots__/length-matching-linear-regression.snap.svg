1585179122,-1.95509460370522 7.780658726842376,-1.988773650926305" data-type="line" data-label="" points="387.18486340716487,398.2037841482088 391.2263490736951,399.5509460370522" fill="none" stroke="hsl(150, 100%, 50%)" stroke-width="6"/></g><g><polyline data-points="7.780658726842376,-1.988773650926305 7.904148566653022,-2" data-type="line" data-label="" points="391.2263490736951,399.5509460370522 396.1659426661209,400" fill="none" stroke="hsl(150, 100%, 50%)" stroke-width="6"/></g><g><polyline data-points="7.904148566653022,-2 10,-2" data-type="line" data-label="" points="396.1659426661209,400 480,400" fill="none" stroke="hsl(150, 100%, 50%)" stroke-width="6"/></g><g><rect data-type="rect" data-label="" data-x="6" data-y="0" x="40" y="160" width="560" height="320" fill="rgba(30,41,59,0.03)" stroke="rgba(30,41,59,0.55)" stroke-width="0.025"/></g><g><rect data-type="rect" data-label="" data-x="0" data-y="2" x="60" y="220" width="40" height="40" fill="rgba(255,0,0,0.25)" stroke="rgba(255,0,0,0.5)" stroke-width="0.025"/></g><g><rect data-type="rect" data-label="" data-x="12" data-y="2" x="540" y="220" width="40" height="40" fill="rgba(255,0,0,0.25)" stroke="rgba(255,0,0,0.5)" stroke-width="0.025"/></g><g><rect data-type="rect" data-label="" data-x="6" data-y="0" x="290" y="300" width="60" height="40" fill="rgba(255,0,0,0.25)" stroke="rgba(255,0,0,0.5)" stroke-width="0.025"/></g><g><rect data-type="rect" data-label="" data-x="0" data-y="-2" x="60" y="380" width="40" height="40" fill="rgba(255,0,0,0.25)" stroke="rgba(255,0,0,0.5)" stroke-width="0.025"/></g><g><rect data-type="rect" data-label="" data-x="10" data-y="-2" x="460" y="380" width="40" height="40" fill="rgba(255,0,0,0.25)" stroke="rgba(255,0,0,0.5)" stroke-width="0.025"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":40,"c":0,"e":80,"b":0,"d":-40,"f":320};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>